<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Recuperacao de Senha</title>
  </head>
  <body style="margin:0;padding:0;background-color:#f6f6f6;font-family:Arial,Helvetica,sans-serif;">
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#f6f6f6;">
      <tr>
        <td align="center" style="padding:24px;">
          <table role="presentation" width="600" cellpadding="0" cellspacing="0" style="background-color:#ffffff;border-radius:8px;overflow:hidden;">
            <tr>
              <td style="padding:24px 32px 8px;">
                <h1 style="margin:0;font-size:20px;color:#111111;">Recuperacao de Senha</h1>
              </td>
            </tr>
            <tr>
              <td style="padding:0 32px 16px;color:#333333;font-size:14px;line-height:1.5;">
                <p>Voce solicitou a redefinicao da sua senha. Use o botao abaixo para criar uma nova senha.</p>
              </td>
            </tr>
            <tr>
              <td align="center" style="padding:8px 32px 24px;">
                <a href="{{link}}" style="display:inline-block;background-color:#1f6feb;color:#ffffff;text-decoration:none;padding:12px 20px;border-radius:6px;font-size:14px;">Redefinir senha</a>
              </td>
            </tr>
            <tr>
              <td style="padding:0 32px 24px;color:#666666;font-size:12px;line-height:1.4;">
                <p>Se voce nao solicitou esta alteracao, ignore este email.</p>
                <p>Ou copie e cole o link no navegador:<br />{{link}}</p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
